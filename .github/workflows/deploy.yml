name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: [self-hosted, pi]
    steps:
      - name: Pull latest
        working-directory: /home/orrinmanning/bananabread-blog
        run: git fetch origin && git reset --hard origin/main

      - name: Rebuild and restart
        working-directory: /home/orrinmanning/bananabread-blog
        run: docker compose up -d --build
