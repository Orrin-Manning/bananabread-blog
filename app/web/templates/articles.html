{% extends "base.html" %}

{% block title %}Articles — Banana Bread{% endblock %}

{% block content %}
<main class="page">
  <p class="section-label">Articles</p>
  <div class="card-grid">
    {% for article in articles %}
    <a href="/articles/{{ article.slug }}" class="card">
      <p class="card__kicker">{{ article.category }}</p>
      <h2 class="card__headline">{{ article.title }}</h2>
      <p class="card__excerpt">{{ article.excerpt }}</p>
      <p class="card__byline">{{ article.date.strftime('%-d %B %Y') }}</p>
    </a>
    {% endfor %}
  </div>
</main>
{% endblock %}
