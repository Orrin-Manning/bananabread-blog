<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Banana Bread{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400;1,600&family=Spectral:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/styles.css?v={{ version }}">
  {% block extra_head %}{% endblock %}
</head>
<body>
  <header class="masthead">
    <p class="masthead__eyebrow">A cooking journal</p>
    <a href="/"><h1 class="masthead__title">Banana Bread</h1></a>
    <p class="masthead__tagline">Recipes, technique, and the pleasure of cooking well</p>
    <p class="masthead__meta">{{ date }}</p>
  </header>

  <div class="nav-wrapper">
    <span class="nav-edge nav-edge--left" aria-hidden="true"></span>
    <nav class="nav">
      <a href="/recipes" class="nav__link">Recipes</a>
      <a href="/technique" class="nav__link">Technique</a>
      <a href="/ingredients" class="nav__link">Ingredients</a>
      <a href="/essays" class="nav__link">Essays</a>
      <a href="/about" class="nav__link">About</a>
    </nav>
    <span class="nav-edge nav-edge--right" aria-hidden="true"></span>
  </div>

  {% block content %}{% endblock %}

  <script>
    (function () {
      var wrapper = document.querySelector('.nav-wrapper');
      var nav = wrapper && wrapper.querySelector('.nav');
      var leftEdge = wrapper && wrapper.querySelector('.nav-edge--left');
      var rightEdge = wrapper && wrapper.querySelector('.nav-edge--right');
      if (!nav) return;

      function update() {
        var atStart = nav.scrollLeft <= 2;
        var atEnd = nav.scrollLeft + nav.clientWidth >= nav.scrollWidth - 2;
        if (rightEdge) rightEdge.style.opacity = atEnd ? '0' : '0.7';
        if (leftEdge)  leftEdge.style.opacity  = atStart ? '0' : '0.7';
      }

      nav.addEventListener('scroll', update, { passive: true });
      window.addEventListener('resize', update);
      window.addEventListener('load', update);
      update();
    })();
  </script>

  {% block extra_scripts %}{% endblock %}
</body>
</html>
